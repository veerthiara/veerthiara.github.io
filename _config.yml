title: Veer Thiara
description: Portfolio, project documentation, and learning journey
url: https://veerthiara.github.io
baseurl: ""
markdown: kramdown
permalink: pretty
exclude:
  - README.md
  - DEVELOPER_NOTES.md
  - FIRST_TIME_PORTFOLIO_GUIDE.md
  - node_modules
  - vendor
  - scripts
  - package.json
  - package-lock.json
  - Gemfile

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: page
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
