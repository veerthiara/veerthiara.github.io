---
layout: default
---
<article class="content-panel">
  {% unless page.show_title == false %}
    <p class="eyebrow">Journal Entry</p>
    <h1>{{ page.title }}</h1>
    <p class="meta-line">
      <span>{{ page.date | date: "%B %d, %Y" }}</span>
      {% if page.categories and page.categories != empty %}
        <span>{{ page.categories | join: " / " }}</span>
      {% endif %}
    </p>
  {% endunless %}
  <div class="page-content">
    {{ content }}
  </div>
</article>
